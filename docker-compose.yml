services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      ALLOWED_ORIGIN: "http://localhost:5173"
      # FM_KEY: ""  # Uncomment and set your CloudBees Feature Management key to enable feature flags
    ports:
      - "8080:8080"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: "http://backend:8080"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
